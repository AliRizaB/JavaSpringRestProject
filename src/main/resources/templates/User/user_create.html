<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create User</title>
    <link th:fragment="header-css" th:href="@{/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <script th:fragment="footer-js" th:src="@{/bootstrap/js/bootstrap.bundle.min.js}"></script>
</head>
<body class="bg-light">
    <div th:replace="~{commonNavBar :: main-navbar}"></div>

    <div class="container d-flex justify-content-center align-items-center vh-100">

        <div class="bg-dark card shadow-sm" style="width: 100%; max-width: 400px;">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4 text-light">Create User</h3>



                <form method="POST" th:action="@{/user/create}" th:object="${user}" enctype="multipart/form-data">
                    <div th:if="${#fields.hasAnyErrors()}">
                        <p class="text-danger fs-6">Please fix the errors: </p>
                    </div>

                    <div class="mb-3">
                        <label for="name" class="fs-5 form-label text-light" >Name: </label>
                        <input type="text" class="form-control" id="name" th:field="*{name}" placeholder="FullName" required>
                        <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger"></span>
                    </div>

                    <div class="mb-3">
                        <label for="address" class="fs-5 form-label text-light" >Address: </label>
                        <input type="text" class="form-control" id="address" th:field="*{address}" placeholder="Address..." required>
                        <span th:if="${#fields.hasErrors('address')}" th:errors="*{address}" class="text-danger"></span>
                    </div>

                    <div class="mb-3">
                        <label for="imageUser" class="form-label text-light">User Image:</label>
                        <input type="file" class="form-control" id="imageUser" name="img" accept="image/*" required>
                    </div>

                    <div class="mb-3">
                        <label for="username" class="fs-5 form-label text-light" >Username: </label>
                        <input type="text" class="form-control" id="username" th:field="*{username}" placeholder="Username" required>
                        <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="text-danger"></span>
                    </div>

                    <div class="mb-3">
                        <label for="passwordUser" class="fs-5 form-label text-light" >Password: </label>
                        <input type="password" class="form-control" id="passwordUser" th:field="*{password}" placeholder="Password" required>
                        <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-danger"></span>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-success">CREATE</button>
                    </div>
                </form>

            </div>
        </div>

    </div>
</body>
</html>
