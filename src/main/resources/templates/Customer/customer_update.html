<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update Customer</title>
    <link th:fragment="header-css" th:href="@{/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <script th:fragment="footer-js" th:src="@{/bootstrap/js/bootstrap.bundle.min.js}"></script>
</head>
<body class="bg-light">
<div th:replace="~{commonNavBar :: main-navbar}"></div>

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="bg-dark card shadow-sm" style="width: 100%; max-width: 400px;">
        <div class="card-body p-4">
            <h3 class="card-title text-center mb-4 text-primary ">Update Customer</h3>

            <form method="POST" th:action="@{/customer/update/{id}(id=${customer.id})}" th:object="${customer}">
                <div th:if="${#fields.hasAnyErrors()}">
                    <p class="text-danger fs-6">Please fix the errors: </p>
                </div>

                <div class="mb-3">
                    <label for="name" class="fs-5 form-label text-light" >Name: </label>
                    <input type="text" class="form-control" id="name" th:field="*{name}" placeholder="FullName">
                    <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger"></span>
                </div>

                <div class="mb-3">
                    <label for="address" class="fs-5 form-label text-light" >Address: </label>
                    <input type="text" class="form-control" id="address" th:field="*{address}" placeholder="Address...">
                    <span th:if="${#fields.hasErrors('address')}" th:errors="*{address}" class="text-danger"></span>
                </div>

                <div class="mb-3">
                    <label for="telephone" class="fs-5 form-label text-light" >Telephone Number: </label>
                    <input type="tel" class="form-control" id="telephone" th:field="*{telephone}" placeholder="Tel No...">
                    <span th:if="${#fields.hasErrors('telephone')}" th:errors="*{telephone}" class="text-danger"></span>
                </div>
                <div class="card-body text-center">
                    <button type="submit" class="btn btn-success">UPDATE</button>
                    <a th:href="@{/customer/read}" class="btn btn-light">CANCEL</a>
                </div>
            </form>

        </div>
    </div>

</div>
</body>
</html>
