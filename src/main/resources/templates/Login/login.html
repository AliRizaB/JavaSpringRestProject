<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link th:fragment="header-css" th:href="@{/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <script th:fragment="footer-js" th:src="@{/bootstrap/js/bootstrap.bundle.min.js}"></script>
</head>
<body>

<main class="bg-light">
    <div th:replace="~{commonNavBar :: main-navbar}"></div>


    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="bg-dark card shadow-sm" style="width: 100%; max-width: 400px;">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4 text-light ">Please sign in</h3>

                <div th:if="${param.error}" class="alert alert-danger">
                    Invalid username or password.
                </div>

                <div th:if="${param.logout}" class="alert alert-success">
                    You have been logged out.
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label for="username" class="fs-5 form-label text-light">Username</label>
                        <input type="text" id="username" name="username" class="form-control" required autofocus>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="fs-5 form-label text-light">Password</label>
                        <input type="password" id="password" name="password" class="form-control" required>
                    </div>

                    <div class="card-body text-center">
                        <button class="btn btn-success" type="submit">SIGN IN</button>
                        <a th:href="@{/}" class="btn btn-light">BACK</a>
                    </div>
                </form>


            </div>
        </div>
    </div>
</main>

</body>
</html>
