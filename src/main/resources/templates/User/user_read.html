<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Read Users</title>
    <link th:fragment="header-css" th:href="@{/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <script th:fragment="footer-js" th:src="@{/bootstrap/js/bootstrap.bundle.min.js}"></script>
</head>
<body>
<div th:replace="~{commonNavBar :: main-navbar}"></div>
<div class="p-5 bg-light">
    <table class="table table-hover" style="table-layout: fixed; width: 100%;">
        <thead class="table-dark">
        <tr>
            <th style="width: 20%">Photo</th>
            <th style="width: 5%">ID</th>
            <th style="width: 20%">Name</th>
            <th style="width: 30%">Address</th>
            <th style="width: 20%">Username</th>

            <th sec:authorize="hasRole('ADMIN')" class="text-center" style="width: 25%">FUNCTIONS</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}">
            <td>
                <img th:src="@{'/images/' + ${user.imageUrl}}"
                     alt="User Profile Image"
                     class="img-thumbnail"
                     style="width: 100px; height: 100px; object-fit: cover;">
            </td>
            <td th:text="${user.id}"></td>
            <td class="text-truncate" th:text="${user.name}"></td>
            <td class="text-truncate" th:text="${user.address}"></td>
            <td class="text-truncate" th:text="${user.username}"></td>

            <td sec:authorize="hasRole('ADMIN')" class="text-center">
                <div class="d-flex justify-content-center gap-2">
                    <a class="btn btn-danger btn-sm" th:href="@{/user/delete/{id}(id=${user.id})}">DELETE</a>
                    <a class="btn btn-primary btn-sm" th:href="@{/user/edit/{id}(id=${user.id})}">UPDATE</a>
                    <a class="btn btn-success btn-sm" th:href="@{/user/info/{id}(id=${user.id})}">INFO</a>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
