<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Read Customers</title>
    <link th:fragment="header-css" th:href="@{/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <script th:fragment="footer-js" th:src="@{/bootstrap/js/bootstrap.bundle.min.js}"></script>
</head>
<body>
<div th:replace="~{commonNavBar :: main-navbar}"></div>
<div class="p-5 bg-light">
    <table class="table table-hover" style="table-layout: fixed; width: 100%;">
        <thead class="table-dark">
        <tr>
            <th style="width: 5%">ID</th>
            <th style="width: 20%">Name</th>
            <th style="width: 30%">Address</th>
            <th style="width: 20%">Telephone</th>
            <th class="text-center" style="width: 25%">FUNCTIONS</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="customer : ${Customers}">
            <td th:text="${customer.id}"></td>
            <td class="text-truncate" th:text="${customer.name}"></td>
            <td class="text-truncate" th:text="${customer.address}"></td>
            <td th:text="${customer.telephone}"></td>
            <td class="text-center">
                <div class="d-flex justify-content-center gap-2">
                    <a class="btn btn-danger btn-sm" th:href="@{/customer/delete/{id}(id=${customer.id})}">DELETE</a>
                    <a class="btn btn-primary btn-sm" th:href="@{/customer/update/{id}(id=${customer.id})}">UPDATE</a>
                    <a class="btn btn-success btn-sm" th:href="@{/customer/info/{id}(id=${customer.id})}">INFO</a>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
